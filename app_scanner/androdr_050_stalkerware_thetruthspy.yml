title: TheTruthSpy stalkerware package detected
id: androdr-050
status: experimental
description: >
    Detects installed apps whose package name matches known TheTruthSpy
    stalkerware variants.  TheTruthSpy operates under at least 13 aliases
    (Copy9, iSpyoo, MxSpy, Spyzee, etc.) and uses distinctive package
    prefixes that are unlikely to appear in legitimate software.
author: AndroDR AI Pipeline
date: 2026/03/28
references:
    - https://github.com/AssoEchap/stalkerware-indicators
    - https://www.thetruthspy.com  # vendor site (for attribution only)
    - https://techcrunch.com/tag/thetruthspy/
tags:
    - attack.t1418
    - attack.t1636
logsource:
    product: androdr
    service: app_scanner
detection:
    selection:
        package_name|contains:
            - com.thetruth
            - com.ttsapp
            - com.ispyoo
            - com.mxspy
            - com.spyzee
            - com.apspy
    condition: selection
level: high
falsepositives:
    - None expected; these package prefixes are unique to TheTruthSpy aliases
display:
    category: app_risk
    icon: visibility_off
    triggered_title: "Stalkerware: TheTruthSpy"
    evidence_type: ioc_match
remediation:
    - "This app belongs to the TheTruthSpy stalkerware family. It can record calls, read messages, and track location."
    - "Uninstall immediately. Consider a factory reset if you did not install it yourself."
    - "If you suspect someone installed this without your consent, contact a domestic violence hotline for guidance."
