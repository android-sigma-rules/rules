title: mSpy stalkerware package detected
id: androdr-053
status: experimental
description: >
    Detects installed apps whose package name matches known mSpy/Eyezy
    stalkerware variants.  mSpy uses highly deceptive package names that
    impersonate system components (e.g. core.framework, system.framework,
    update.service.android) to evade detection.
author: AndroDR AI Pipeline
date: 2026/03/28
references:
    - https://github.com/AssoEchap/stalkerware-indicators
    - https://www.mspy.com  # vendor site (for attribution only)
    - https://techcrunch.com/tag/mspy/
tags:
    - attack.t1418
    - attack.t1636
    - attack.t1036.005
logsource:
    product: androdr
    service: app_scanner
detection:
    selection:
        package_name|contains:
            - com.mspy
            - com.eyezy
            - med.mspy
            - update.service.android
            - core.update.framework
    condition: selection
level: high
falsepositives:
    - "update.service.android could theoretically match a legitimate OEM updater, but this exact package pattern is not used by any known Android OEM"
    - "core.update.framework could match custom ROM framework components on rooted devices"
display:
    category: app_risk
    icon: visibility_off
    triggered_title: "Stalkerware: mSpy"
    evidence_type: ioc_match
remediation:
    - "This app belongs to the mSpy stalkerware family. It can read messages, track location, record calls, and capture keystrokes."
    - "Uninstall immediately. Consider a factory reset if you did not install it yourself."
    - "If you suspect someone installed this without your consent, contact a domestic violence hotline for guidance."
