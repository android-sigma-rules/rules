title: FlexiSpy stalkerware package detected
id: androdr-051
status: experimental
description: >
    Detects installed apps whose package name matches known FlexiSpy
    stalkerware variants.  FlexiSpy is a commercial surveillance tool
    marketed for employee/child monitoring but widely abused as stalkerware.
    It disguises itself using generic-sounding package names.
author: AndroDR AI Pipeline
date: 2026/03/28
references:
    - https://github.com/AssoEchap/stalkerware-indicators
    - https://flexispy.com  # vendor site (for attribution only)
    - https://citizenlab.ca/tag/flexispy/
tags:
    - attack.t1418
    - attack.t1636
logsource:
    product: androdr
    service: app_scanner
detection:
    selection:
        package_name|contains:
            - com.vvt.android
            - com.fp.backup
    condition: selection
level: high
falsepositives:
    - "com.fp.backup could theoretically collide with a legitimate app using the 'fp' namespace; however no known legitimate apps use this exact prefix"
display:
    category: app_risk
    icon: visibility_off
    triggered_title: "Stalkerware: FlexiSpy"
    evidence_type: ioc_match
remediation:
    - "This app belongs to the FlexiSpy stalkerware family. It can intercept calls, messages, and enable the microphone remotely."
    - "Uninstall immediately. Consider a factory reset if you did not install it yourself."
    - "If you suspect someone installed this without your consent, contact a domestic violence hotline for guidance."
