title: DNS query to known stalkerware C2 domain
id: androdr-055
status: experimental
description: >
    Detects DNS queries to command-and-control domains associated with
    five major stalkerware families: TheTruthSpy, FlexiSpy, Cerberus,
    mSpy, and Cocospy/Spyzie.  A match indicates an installed app is
    actively communicating with stalkerware infrastructure.
author: AndroDR AI Pipeline
date: 2026/03/28
references:
    - https://github.com/AssoEchap/stalkerware-indicators
    - https://techcrunch.com/tag/thetruthspy/
    - https://citizenlab.ca/tag/flexispy/
tags:
    - attack.t1437
    - attack.t1437.001
logsource:
    product: androdr
    service: dns_monitor
detection:
    selection:
        domain|contains:
            # TheTruthSpy
            - thetruthspy.com
            - copy9.com
            - ispyoo.com
            # FlexiSpy
            - flexispy.com
            - djp.bz
            - dmw.bz
            - mflx.biz
            # Cerberus
            - cerberusapp.com
            # mSpy
            - thd.cc
            - mspy.alter757.info
            # Cocospy cluster
            - appjiagu.com
            - cocospy.com
            - spyic.com
            - spyzie.io
            - phonedata.me
            - kuuvv.com
    condition: selection
level: high
falsepositives:
    - "Users researching stalkerware who visit these domains in a browser will trigger DNS queries"
    - "cerberusapp.com may appear for users who legitimately use Cerberus as an anti-theft tool"
display:
    category: network
    icon: dns
    triggered_title: "Stalkerware C2 Domain"
    evidence_type: ioc_match
remediation:
    - "Your device contacted a domain associated with commercial stalkerware infrastructure."
    - "This strongly suggests an installed app is reporting your activity to a stalkerware operator."
    - "Review installed apps for stalkerware (rules androdr-050 through androdr-054) and uninstall any found."
    - "If you suspect someone installed surveillance software without your consent, contact a domestic violence hotline for guidance."
