title: Install from Unknown Sources allowed
id: androdr-042
status: production
description: The device permits installation of apps from sources outside the official app store, increasing exposure to trojanized APKs.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1476
logsource:
    product: androdr
    service: device_auditor
detection:
    selection:
        unknown_sources_enabled: true
    condition: selection
level: high
remediation:
    - "Disable installation from unknown sources to prevent sideloaded threats."
