title: No screen lock configured
id: androdr-043
status: production
description: No screen lock (PIN, password, pattern, or biometric) is configured, leaving the device accessible to anyone with physical access.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1432
logsource:
    product: androdr
    service: device_auditor
detection:
    selection:
        screen_lock_enabled: false
    condition: selection
level: critical
remediation:
    - "Set a PIN, password, pattern, or biometric lock to protect your device."
