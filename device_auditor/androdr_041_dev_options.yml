title: Developer Options enabled
id: androdr-041
status: production
description: Developer Options are enabled, exposing low-level device settings that can be abused by malware or an attacker with physical access.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1404
logsource:
    product: androdr
    service: device_auditor
detection:
    selection:
        dev_options_enabled: true
    condition: selection
level: medium
remediation:
    - "Disable Developer Options unless actively needed."
