title: Bootloader unlocked
id: androdr-045
status: production
description: The device bootloader is unlocked, disabling Android Verified Boot and allowing persistent firmware-level tampering.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1401
logsource:
    product: androdr
    service: device_auditor
detection:
    selection:
        bootloader_unlocked: true
    condition: selection
level: critical
remediation:
    - "Re-lock the bootloader unless you need it for custom ROM development."
