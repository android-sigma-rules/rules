title: Wireless ADB enabled
id: androdr-046
status: production
description: Wireless ADB (Android Debug Bridge over Wi-Fi) is active, allowing any device on the same network to issue shell commands without a USB connection.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1404
logsource:
    product: androdr
    service: device_auditor
detection:
    selection:
        wifi_adb_enabled: true
    condition: selection
level: high
remediation:
    - "Disable Wireless ADB — any device on the same network can connect."
