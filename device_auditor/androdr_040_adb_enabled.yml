title: USB Debugging enabled
id: androdr-040
status: production
description: USB Debugging (ADB) is enabled, allowing shell access over USB without authentication.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1404
logsource:
    product: androdr
    service: device_auditor
detection:
    selection:
        adb_enabled: true
    condition: selection
level: high
remediation:
    - "Disable USB Debugging in Developer Options when not actively developing."
